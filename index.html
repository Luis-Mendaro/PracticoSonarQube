<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonarQube Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #222;
    }

    .container {
      width: 80%;
      margin: auto;
      overflow: hidden;
    }

    header {
      background: #50a8a0;
      color: #ffffff;
      padding-top: 30px;
      padding-bottom: 20px;
      min-height: 70px;
      border-bottom: #e8491d 3px solid;
    }

    #branding {
      float: left;
    }

    #branding h1 {
      margin: 0;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      background-color: #ffffff;
    }

    th,
    td {
      border: 1px solid #000;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #d9d9d9;
    }

    .action-button {
      margin-top: 20px;
      padding: 10px 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <header>
    <div class="container">
      <div id="branding">
        <h1>SonarQube Demo</h1>
      </div>
      <img src="logo.png" alt="Logo de SonarQube Demo">
    </div>
  </header>

  <div class="container">
    <form action="#">
      <input type="text" placeholder="Buscar..." aria-label="Buscar">
      <button type="submit">Buscar</button>
    </form>

    <h2>Bienvenido al Demo</h2>
    <p>Este sitio tiene problemas deliberados para ser detectados por SonarQube.</p>

    <table>
      <thead>
        <tr>
          <th>Columna 1</th>
          <th>Columna 2</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Fila 1, Celda 1</td>
          <td>Fila 1, Celda 2</td>
        </tr>
        <tr>
          <td>Fila 2, Celda 1</td>
          <td>Fila 2, Celda 2</td>
        </tr>
      </tbody>
    </table>

    <button id="alertButton" class="action-button" type="button">Clic aquí</button>

    <script src="scripts.js"></script>
  </div>
</body>

</html>
